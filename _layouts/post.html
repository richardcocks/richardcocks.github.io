---
layout: default
---

<p class="post-meta">
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
</p>

{{ content }}

<hr>

<footer class="post-footer">
  {% if page.previous or page.next %}
  <nav class="post-nav">
    {% if page.previous %}
      <p>Previous: <a href="{{ page.previous.url | relative_url }}">{{ page.previous.title }}</a></p>
    {% endif %}
    {% if page.next %}
      <p>Next: <a href="{{ page.next.url | relative_url }}">{{ page.next.title }}</a></p>
    {% endif %}
  </nav>
  {% endif %}

  <p>
    <a href="{{ '/' | relative_url }}">All posts</a> &middot;
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a> &middot;
    <a href="https://bsky.app/profile/eterm.bsky.social">@eterm.bsky.social</a>
  </p>
</footer>
